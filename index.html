<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Pedro Eduardo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .site-header {
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.6);
      color: #fff;
    }

    .btn-start:active {
      transform: translateY(0);
    }

    .btn-start i {
      font-size: 1.1rem;
    }

    #webcam-container canvas {
      border-radius: 16px;
      width: 100% !important;
      height: auto !important;
      max-width: 320px;
      display: block;
      margin: 0 auto;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .webcam-placeholder {
      width: 100%;
      max-width: 320px;
      height: 240px;
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
      border: 2px dashed rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      margin: 0 auto;
    }

    .webcam-placeholder i {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .label-item {
      margin-bottom: 1rem;
    }

    .label-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .label-prob {
      font-size: 0.95rem;
      font-weight: 700;
      color: #a78bfa;
      min-width: 48px;
      text-align: right;
    }

    .progress {
      height: 10px;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
    }

    .progress-bar {
      border-radius: 50px;
      background: linear-gradient(90deg, #7c3aed, #60a5fa);
      transition: width 0.3s ease;
    }

    .progress-bar.high {
      background: linear-gradient(90deg, #10b981, #34d399);
    }

    .progress-bar.mid {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 50px;
      font-weight: 600;
    }

    .status-idle {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }

    .status-active {
      background: rgba(16,185,129,0.15);
      color: #34d399;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1rem;
    }

    footer {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header py-3 mb-4">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <span class="logo-text"><i class="bi bi-cpu me-2"></i>Pedro Eduardo</span>
        <span class="status-badge status-idle" id="status-badge">
          <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);"></span>
          <span id="status-text">Aguardando</span>
        </span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="container pb-5">
    <div class="row g-4 justify-content-center">

      <!-- Camera Column -->
      <div class="col-12 col-md-6 col-lg-5">
        <div class="glass-card p-4 h-100">
          <p class="section-title"><i class="bi bi-camera-video me-1"></i>Câmera</p>

          <div id="webcam-container" class="mb-4">
            <div class="webcam-placeholder" id="cam-placeholder">
              <i class="bi bi-camera-video-off"></i>
              <span style="font-size:0.85rem;">Câmera inativa</span>
            </div>
          </div>

          <div class="d-grid">
            <button class="btn btn-start" id="btn-start" onclick="init()">
              <i class="bi bi-play-circle-fill me-2"></i>Ativar Câmera
            </button>
          </div>

          <p class="text-center mt-3" style="font-size:0.78rem;color:rgba(255,255,255,0.35);">
            <i class="bi bi-shield-lock me-1"></i>Permissão de câmera necessária
          </p>
        </div>
      </div>

      <!-- Results Column -->
      <div class="col-12 col-md-6 col-lg-5">
        <div class="glass-card p-4 h-100">
          <p class="section-title"><i class="bi bi-bar-chart-line me-1"></i>Resultados</p>

          <div id="label-container">
            <div class="d-flex flex-column align-items-center justify-content-center h-100 py-5" style="color:rgba(255,255,255,0.25);">
              <i class="bi bi-graph-up" style="font-size:2.5rem;margin-bottom:.75rem;"></i>
              <span style="font-size:0.88rem;">Inicie a câmera para ver as predições</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="text-center pb-4">
    <span>Desenvolvido por Pedro Eduardo &mdash; Powered by Teachable Machine</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/l2BYOy1gWF/";
    let model, webcam, labelContainer, maxPredictions;

    function setStatus(active) {
      const badge = document.getElementById('status-badge');
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (active) {
        badge.className = 'status-badge status-active';
        dot.className = 'pulse';
        text.textContent = 'Ativo';
      } else {
        badge.className = 'status-badge status-idle';
        dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);';
        text.textContent = 'Aguardando';
      }
    }

    function getBarClass(prob) {
      if (prob >= 0.65) return 'high';
      if (prob >= 0.35) return 'mid';
      return '';
    }

    async function init() {
      const btn = document.getElementById('btn-start');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Carregando...';

      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(320, 320, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Replace placeholder with webcam
      const container = document.getElementById("webcam-container");
      container.innerHTML = '';
      container.appendChild(webcam.canvas);

      // Build label bars
      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = '';
      for (let i = 0; i < maxPredictions; i++) {
        const div = document.createElement("div");
        div.className = "label-item";
        div.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="label-name" id="name-${i}">Classe ${i + 1}</span>
            <span class="label-prob" id="prob-${i}">0%</span>
          </div>
          <div class="progress"><div class="progress-bar" id="bar-${i}" role="progressbar" style="width:0%"></div></div>
        `;
        labelContainer.appendChild(div);
      }

      btn.innerHTML = '<i class="bi bi-camera-video-fill me-2"></i>Em execução';
      setStatus(true);
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct = (prob * 100).toFixed(1);
        const nameEl = document.getElementById(`name-${i}`);
        const probEl = document.getElementById(`prob-${i}`);
        const barEl = document.getElementById(`bar-${i}`);
        if (nameEl) nameEl.textContent = prediction[i].className;
        if (probEl) probEl.textContent = pct + '%';
        if (barEl) {
          barEl.style.width = pct + '%';
          barEl.className = 'progress-bar ' + getBarClass(prob);
        }
      }
    }
  </script>

</body>
</html>
